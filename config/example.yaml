# cctvQL Configuration
# Copy this file to config/config.yaml and customize for your setup.
# -------------------------------------------------------------------

logging:
  level: INFO   # DEBUG | INFO | WARNING | ERROR

# ---------------------------------------------------------------------------
# LLM Backends
# ---------------------------------------------------------------------------
llm:
  active: ollama    # Which backend to use: ollama | openai | anthropic

  backends:
    # Option 1: Ollama (local, fully private — recommended)
    ollama:
      provider: ollama
      host: http://localhost:11434
      model: llama3         # or mistral, phi3, gemma2, etc.

    # Option 2: OpenAI API
    openai:
      provider: openai
      model: gpt-4o-mini    # or gpt-4o for best accuracy
      api_key: ""           # or set OPENAI_API_KEY env var

    # Option 3: Anthropic API
    anthropic:
      provider: anthropic
      model: claude-haiku-4-5-20251001
      api_key: ""           # or set ANTHROPIC_API_KEY env var

    # Option 4: Any OpenAI-compatible endpoint (LM Studio, Together AI, etc.)
    lmstudio:
      provider: openai
      base_url: http://localhost:1234/v1
      model: local-model
      api_key: lm-studio    # required but can be anything

# ---------------------------------------------------------------------------
# CCTV Adapters
# ---------------------------------------------------------------------------
adapters:
  active: frigate   # Which adapter to use: frigate | onvif

  systems:
    # Option 1: Frigate NVR
    frigate:
      type: frigate
      host: http://192.168.1.100:5000    # Frigate URL
      mqtt_host: 192.168.1.100           # Optional: MQTT broker for real-time events
      mqtt_port: 1883

    # Option 2: ONVIF device (any ONVIF-compatible camera/NVR)
    onvif:
      type: onvif
      host: 192.168.1.200
      port: 80
      username: admin
      password: ""

    # Option 3: Hikvision NVR (ISAPI)
    hikvision:
      type: hikvision
      host: http://192.168.1.64
      username: admin
      password: ""
      channel_count: 8   # optional, auto-detected if omitted

    # Option 4: Dahua NVR (CGI)
    dahua:
      type: dahua
      host: 192.168.1.108
      port: 80
      username: admin
      password: ""
      channel_count: 4

    # Option 5: Demo (no hardware required — for testing and development)
    demo:
      type: demo

# ---------------------------------------------------------------------------
# Database (SQLite persistence for session history and event log)
# ---------------------------------------------------------------------------
# database:
#   path: cctvql.db        # default — relative to working directory
#                          # set CCTVQL_DB_PATH env var to override at runtime

# ---------------------------------------------------------------------------
# Notifications
# Channels are optional — configure only what you need.
# ---------------------------------------------------------------------------
# notifications:
#
#   # Webhook — POST JSON to any URL on alert
#   webhooks:
#     - url: https://your-server.example.com/cctv-alert
#     - url: https://hooks.zapier.com/hooks/catch/...
#
#   # Telegram — send message to a bot chat
#   telegram:
#     bot_token: "123456:ABCdef..."   # from @BotFather
#     chat_id: "-1001234567890"       # user ID or group chat ID
#
#   # Slack — Incoming Webhook URL
#   slack:
#     webhook_url: https://hooks.slack.com/services/T.../B.../...
#
#   # ntfy — push notifications via ntfy.sh (or self-hosted)
#   ntfy:
#     topic: my-cctv-alerts
#     server: https://ntfy.sh        # omit to use ntfy.sh default
#
#   # Email via SMTP
#   email:
#     smtp_host: smtp.gmail.com
#     smtp_port: 587
#     username: you@gmail.com
#     password: ""                   # or set CCTVQL_SMTP_PASSWORD env var
#     from_addr: you@gmail.com
#     to_addrs:
#       - alerts@example.com
#     use_tls: true
