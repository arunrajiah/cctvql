<script type="text/javascript">
RED.nodes.registerType('cctvql-events', {
    category: 'cctvQL',
    color: '#1a2040',
    defaults: {
        name: { value: '' },
        server: { value: '', type: 'cctvql-config', required: true },
        camera: { value: '' },
        label: { value: '' },
        limit: { value: 20 },
        pollInterval: { value: 0 },
    },
    inputs: 1,
    outputs: 1,
    icon: 'font-awesome/fa-bell',
    paletteLabel: 'events',
    label: function () { return this.name || 'cctvQL events'; },
});
</script>

<script type="text/html" data-template-name="cctvql-events">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-server"><i class="fa fa-server"></i> Server</label>
        <input type="text" id="node-input-server">
    </div>
    <div class="form-row">
        <label for="node-input-camera"><i class="fa fa-video-camera"></i> Camera</label>
        <input type="text" id="node-input-camera" placeholder="all cameras">
        <div class="form-tips">Filter by camera name. Leave blank for all cameras.</div>
    </div>
    <div class="form-row">
        <label for="node-input-label"><i class="fa fa-tag"></i> Label</label>
        <input type="text" id="node-input-label" placeholder="person, car, … (optional)">
    </div>
    <div class="form-row">
        <label for="node-input-limit"><i class="fa fa-list-ol"></i> Limit</label>
        <input type="number" id="node-input-limit" placeholder="20">
    </div>
    <div class="form-row">
        <label for="node-input-pollInterval"><i class="fa fa-clock-o"></i> Poll (s)</label>
        <input type="number" id="node-input-pollInterval" placeholder="0 = trigger on input only">
        <div class="form-tips">Set > 0 to poll automatically. 0 = fetch only when a message arrives.</div>
    </div>
</script>

<script type="text/html" data-help-name="cctvql-events">
    <p>Fetch recent detection events from cctvQL, optionally filtered by camera or label.</p>
    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt>msg.payload <span class="property-type">any</span></dt>
        <dd>Trigger an immediate fetch (any value). Ignored if <b>Poll interval</b> is set.</dd>
    </dl>
    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>msg.payload <span class="property-type">array</span></dt>
        <dd>Array of event objects (camera, type, start_time, objects, snapshot_url, …).</dd>
    </dl>
    <h3>Details</h3>
    <p>Set <b>Poll interval</b> to have the node emit events on a schedule without needing an input trigger.</p>
</script>
