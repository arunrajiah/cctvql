<script type="text/javascript">
RED.nodes.registerType('cctvql-config', {
    category: 'config',
    defaults: {
        name: { value: 'cctvQL Server' },
        host: { value: 'localhost', required: true },
        port: { value: 8000, required: true, validate: RED.validators.number() },
    },
    credentials: {
        apiKey: { type: 'password' },
    },
    label: function () { return this.name || `${this.host}:${this.port}`; },
});
</script>

<script type="text/html" data-template-name="cctvql-config">
    <div class="form-row">
        <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-config-input-name" placeholder="cctvQL Server">
    </div>
    <div class="form-row">
        <label for="node-config-input-host"><i class="fa fa-server"></i> Host</label>
        <input type="text" id="node-config-input-host" placeholder="localhost or 192.168.1.50">
    </div>
    <div class="form-row">
        <label for="node-config-input-port"><i class="fa fa-hashtag"></i> Port</label>
        <input type="number" id="node-config-input-port" placeholder="8000">
    </div>
    <div class="form-row">
        <label for="node-config-input-apiKey"><i class="fa fa-key"></i> API Key</label>
        <input type="password" id="node-config-input-apiKey" placeholder="optional">
    </div>
</script>
